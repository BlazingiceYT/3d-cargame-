<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BlazingIce – City Racer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loader">
  <h1>BLAZINGICE</h1>
  <p>City Racer</p>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<canvas id="c"></canvas>

<!-- HUD overlays MUST be after canvas and use position:fixed -->
<div id="spd"><span id="sv">0</span>KM/H</div>

<div id="hud">
  <div id="ai-info">AI: 18 | 5 RACERS</div>
</div>

<canvas id="mm" width="110" height="110"></canvas>

<div id="controls">
  <div class="btn-group">
    <div class="btn" id="bl">◀</div>
    <div class="btn" id="br">▶</div>
  </div>
  <div class="btn-group">
    <div class="btn" id="bg">■</div>
    <div class="btn" id="gg">▲</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="game.js"></script>

</body>
</html>
